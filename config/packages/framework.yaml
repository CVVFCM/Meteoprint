# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    http_client:
        scoped_clients:
            open_meteo.client:
                base_uri: '%env(OPEN_METEO_BASE_URL)%'
                retry_failed:
                    max_retries: 2
            ffvoile.client:
                base_uri: 'https://carto.ffvoile.fr'
                headers:
                    Accept: 'application/json'
                    User-Agent: 'meteoprint club importer (+https://github.com/yohang/meteoprint)'
                    Referer: 'https://carto.ffvoile.fr/carte/'
                retry_failed:
                    max_retries: 2

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
