# Default values for meteoprint.

image:
  repository: cvvfcm/meteoprint-app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# FrankenPHP web server (serves the Symfony app and the Mercure hub).
# Resources: memory request==limit (Guaranteed memory QoS); cpu request only, no cpu
# limit (avoids CFS throttling). Starting points — tune from `kubectl top`.
web:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # FrankenPHP sizes threads/workers from the HOST core count by default (it doesn't see
  # the cgroup CPU limit) — on a big node that spawns far too many PHP workers and OOMs
  # the memory limit. Pin small explicit counts that fit the resources above.
  frankenphp:
    numThreads: 4
    numWorkers: 2
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Symfony Messenger consumer (php bin/console messenger:consume async).
consumer:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 250m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Public hostname served by the app.
host: meteoprint.cvvfcm.fr

# Gateway API (Traefik on K3s). FrankenPHP serves plain HTTP on :80 in-cluster.
gateway:
  # When true, the chart renders the Gateway. Set false only to attach the HTTPRoute
  # to a Gateway that already exists in the cluster.
  create: true
  # Gateway name the HTTPRoute attaches to (created here when create=true).
  name: meteoprint
  # Defaults to the release namespace when empty.
  namespace: ""
  # GatewayClass — Traefik's Gateway API provider. Verify: kubectl get gatewayclass
  className: traefik
  # Listener ports MUST match Traefik's entrypoint (container) ports — Traefik maps
  # listeners to entrypoints by port, NOT the Service's external port. K3s bundled
  # Traefik: web=8000, websecure=8443 (Service maps external 80/443 → these).
  # Confirm: kubectl -n kube-system get deploy traefik -o jsonpath='{range .spec.template.spec.containers[0].ports[*]}{.name}={.containerPort}{"\n"}{end}'
  httpPort: 8000
  httpsPort: 8443
  # Listener to attach the HTTPRoute to. Empty → attach to ALL listeners (HTTP works
  # immediately; HTTPS once tls.enabled). Set to "websecure" to pin HTTPS-only.
  sectionName: ""
  tls:
    # When true, adds the HTTPS (websecure) listener referencing secretName.
    enabled: false
    secretName: meteoprint-tls
    # Issue secretName via a cert-manager Certificate CR. The referenced Issuer must
    # already exist and be able to solve for this domain — given the node is private
    # (behind Cloudflare/Tailscale), use a DNS-01 ClusterIssuer (e.g. Cloudflare),
    # not HTTP-01.
    certManager:
      enabled: false
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer

# Non-secret application configuration (rendered into a ConfigMap).
app:
  env: prod
  debug: "false"
  # ":80" → plain HTTP only; Caddy will not attempt auto-HTTPS (TLS is at the Gateway).
  serverName: ":80"
  # Internal URL the app POSTs Mercure updates to. MUST be the in-cluster web Service
  # (the FrankenPHP pod that hosts the hub) — NOT localhost, because the consumer runs
  # in a separate pod with no local hub. Empty → derived as
  # http://<release>-web/.well-known/mercure.
  mercureUrl: ""
  # Public URL the browser connects to for Mercure. Empty → derived as
  # https://<host>/.well-known/mercure.
  mercurePublicUrl: ""
  openMeteoBaseUrl: https://api.open-meteo.com
  messengerTransportDsn: doctrine://default?auto_setup=0
  # Base URL for URLs generated in CLI context. Empty → derived as https://<host>.
  defaultUri: ""

# Bundled PostgreSQL (Bitnami subchart). When enabled, DATABASE_URL is derived
# automatically from postgresql.auth below and externalDatabase.url is ignored.
postgresql:
  enabled: false
  auth:
    username: meteoprint
    database: meteoprint
    # Name of a pre-existing Secret holding the DB credentials (keys: "password",
    # "postgres-password"). Owned outside the helm release so it survives uninstall
    # and never regenerates — both the subchart and the app read it. Created by CD.
    # If empty, the subchart auto-generates a password (not stable across uninstalls).
    existingSecret: ""
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password
    password: ""
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 2Gi
  # Bitnami relocated its free images to docker.io/bitnamilegacy in Aug 2025. The
  # pinned chart (~18.7) still references valid images; if pulls fail, switch to the
  # legacy repo and allow it:
  #   image:
  #     repository: bitnamilegacy/postgresql
  #   global:
  #     security:
  #       allowInsecureImages: true

# External PostgreSQL — used only when postgresql.enabled is false.
externalDatabase:
  # Full Doctrine DSN, e.g.
  #   postgresql://meteoprint:secret@db.internal:5432/meteoprint?serverVersion=18&charset=utf8
  url: ""
  # serverVersion advertised in the DATABASE_URL derived for the bundled DB.
  serverVersion: "18"

# Secret values. Supply via --set, a values.local.yaml, or a sealed-secret.
secrets:
  appSecret: ""
  mercureJwtSecret: "!ChangeThisMercureHubJWTSecretKey!"

# Database migration job (Helm post-install/post-upgrade hook).
migrations:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Pod-level security context. The image bakes EXTERNAL_USER_ID (default 1000 =
# www-data); keep runAsUser aligned with the build arg.
podSecurityContext:
  runAsUser: 33
  runAsGroup: 33
  fsGroup: 33

securityContext: {}

serviceAccount:
  create: false
  name: ""
