# Default values for meteoprint.

image:
  repository: cvvfcm/meteoprint-app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

# FrankenPHP web server (serves the Symfony app and the Mercure hub).
# Resources: memory request==limit (Guaranteed memory QoS); cpu request only, no cpu
# limit (avoids CFS throttling). Starting points — tune from `kubectl top`.
web:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Symfony Messenger consumer (php bin/console messenger:consume async).
consumer:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 192Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Public hostname served by the app.
host: meteoprint.cvvfcm.fr

# Gateway API (Traefik on K3s). TLS terminates at the Gateway; FrankenPHP serves
# plain HTTP on :80 inside the cluster.
gateway:
  # When true, the chart also renders a Traefik Gateway. Leave false to attach the
  # HTTPRoute to a Gateway that already exists in the cluster.
  create: false
  # Existing Gateway the HTTPRoute attaches to.
  name: traefik-gateway
  # Defaults to the release namespace when empty.
  namespace: ""
  # Listener name on the Gateway to attach to (HTTPS listener).
  sectionName: websecure
  # Used only when create=true.
  className: traefik
  tls:
    secretName: meteoprint-tls

# Non-secret application configuration (rendered into a ConfigMap).
app:
  env: prod
  debug: "false"
  # ":80" → plain HTTP only; Caddy will not attempt auto-HTTPS (TLS is at the Gateway).
  serverName: ":80"
  # Internal URL the app publishes Mercure updates to.
  mercureUrl: http://localhost/.well-known/mercure
  # Public URL the browser connects to for Mercure. Empty → derived as
  # https://<host>/.well-known/mercure.
  mercurePublicUrl: ""
  openMeteoBaseUrl: https://api.open-meteo.com
  messengerTransportDsn: doctrine://default?auto_setup=0
  # Base URL for URLs generated in CLI context. Empty → derived as https://<host>.
  defaultUri: ""

# Bundled PostgreSQL (Bitnami subchart). When enabled, DATABASE_URL is derived
# automatically from postgresql.auth below and externalDatabase.url is ignored.
postgresql:
  enabled: false
  auth:
    username: meteoprint
    database: meteoprint
    # Name of a pre-existing Secret holding the DB credentials (keys: "password",
    # "postgres-password"). Owned outside the helm release so it survives uninstall
    # and never regenerates — both the subchart and the app read it. Created by CD.
    # If empty, the subchart auto-generates a password (not stable across uninstalls).
    existingSecret: ""
    secretKeys:
      userPasswordKey: password
      adminPasswordKey: postgres-password
    password: ""
  primary:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi
  # Bitnami relocated its free images to docker.io/bitnamilegacy in Aug 2025. The
  # pinned chart (~18.7) still references valid images; if pulls fail, switch to the
  # legacy repo and allow it:
  #   image:
  #     repository: bitnamilegacy/postgresql
  #   global:
  #     security:
  #       allowInsecureImages: true

# External PostgreSQL — used only when postgresql.enabled is false.
externalDatabase:
  # Full Doctrine DSN, e.g.
  #   postgresql://meteoprint:secret@db.internal:5432/meteoprint?serverVersion=18&charset=utf8
  url: ""
  # serverVersion advertised in the DATABASE_URL derived for the bundled DB.
  serverVersion: "18"

# Secret values. Supply via --set, a values.local.yaml, or a sealed-secret.
secrets:
  appSecret: ""
  mercureJwtSecret: "!ChangeThisMercureHubJWTSecretKey!"

# Database migration job (Helm post-install/post-upgrade hook).
migrations:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      memory: 192Mi

# Pod-level security context. The image bakes EXTERNAL_USER_ID (default 1000 =
# www-data); keep runAsUser aligned with the build arg.
podSecurityContext:
  runAsUser: 33
  runAsGroup: 33
  fsGroup: 33

securityContext: {}

serviceAccount:
  create: false
  name: ""
