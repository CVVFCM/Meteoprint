apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "meteoprint.fullname" . }}-config
  labels:
    {{- include "meteoprint.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.app.env | quote }}
  APP_DEBUG: {{ .Values.app.debug | quote }}
  SERVER_NAME: {{ .Values.app.serverName | quote }}
  MESSENGER_TRANSPORT_DSN: {{ .Values.app.messengerTransportDsn | quote }}
  MERCURE_URL: {{ .Values.app.mercureUrl | default (printf "http://%s-web/.well-known/mercure" (include "meteoprint.fullname" .)) | quote }}
  MERCURE_PUBLIC_URL: {{ .Values.app.mercurePublicUrl | default (printf "https://%s/.well-known/mercure" .Values.host) | quote }}
  OPEN_METEO_BASE_URL: {{ .Values.app.openMeteoBaseUrl | quote }}
  DEFAULT_URI: {{ .Values.app.defaultUri | default (printf "https://%s" .Values.host) | quote }}
  # Bound FrankenPHP threads/workers (it otherwise sizes from the host core count and
  # OOMs the pod's memory limit). CLI pods (consumer, migrate) ignore these.
  FRANKENPHP_CONFIG: {{ printf "num_threads %d" (.Values.web.frankenphp.numThreads | int) | quote }}
  FRANKENPHP_WORKER_CONFIG: {{ printf "num %d" (.Values.web.frankenphp.numWorkers | int) | quote }}
