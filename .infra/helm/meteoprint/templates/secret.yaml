apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meteoprint.fullname" . }}-secret
  labels:
    {{- include "meteoprint.labels" . | nindent 4 }}
  annotations:
    # Created before the migrate hook Job (weight -5) so its envFrom resolves.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  DATABASE_URL: {{ required "externalDatabase.url is required (full Doctrine DSN)" .Values.externalDatabase.url | quote }}
  APP_SECRET: {{ required "secrets.appSecret is required" .Values.secrets.appSecret | quote }}
  MERCURE_JWT_SECRET: {{ .Values.secrets.mercureJwtSecret | quote }}
  MERCURE_PUBLISHER_JWT_KEY: {{ .Values.secrets.mercureJwtSecret | quote }}
  MERCURE_SUBSCRIBER_JWT_KEY: {{ .Values.secrets.mercureJwtSecret | quote }}
