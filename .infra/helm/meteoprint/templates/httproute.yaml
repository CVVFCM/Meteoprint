apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: {{ include "meteoprint.fullname" . }}
    labels:
        {{- include "meteoprint.labels" . | nindent 8 }}
spec:
    parentRefs:
        -   name: main
            namespace: traefik
            sectionName: websecure
    hostnames:
        - {{ .Values.host | quote }}
    rules:
        -   matches:
                -   path:
                        type: PathPrefix
                        value: /
            backendRefs:
                -   name: {{ include "meteoprint.fullname" . }}-web
                    port: 80
