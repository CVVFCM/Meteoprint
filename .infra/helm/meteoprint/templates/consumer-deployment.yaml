apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meteoprint.fullname" . }}-consumer
  labels:
    {{- include "meteoprint.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  replicas: {{ .Values.consumer.replicaCount }}
  selector:
    matchLabels:
      {{- include "meteoprint.consumer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "meteoprint.consumer.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: consumer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - php
            - bin/console
            - messenger:consume
            - async
            - --no-debug
            - -vv
            # Recycle the worker periodically (memory hygiene); on exit the container
            # restarts. The worker is PID 1, so a crash also exits the container — no
            # liveness probe needed (and the image ships no pgrep/ps for one anyway).
            - --time-limit=3600
            - --memory-limit=128M
          envFrom:
            - configMapRef:
                name: {{ include "meteoprint.fullname" . }}-config
            - secretRef:
                name: {{ include "meteoprint.fullname" . }}-secret
          {{- if .Values.postgresql.enabled }}
          env:
            {{- include "meteoprint.dbEnv" . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.consumer.resources | nindent 12 }}
      {{- with .Values.consumer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consumer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.consumer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
