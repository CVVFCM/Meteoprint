apiVersion: v1
kind: Service
metadata:
  name: {{ include "meteoprint.fullname" . }}-web
  labels:
    {{- include "meteoprint.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "meteoprint.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
