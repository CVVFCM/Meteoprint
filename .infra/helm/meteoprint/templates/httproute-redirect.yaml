apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: {{ include "meteoprint.fullname" . }}-redirect
    labels:
        {{- include "meteoprint.labels" . | nindent 8 }}
spec:
    parentRefs:
        -   name: main
            namespace: traefik
            sectionName: web
    hostnames:
        - {{ .Values.host | quote }}
    rules:
        -   filters:
                -   type: RequestRedirect
                    requestRedirect:
                        scheme: https
                        statusCode: 301
