{{- if .Values.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  labels:
    {{- include "meteoprint.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      hostname: {{ .Values.host | quote }}
      allowedRoutes:
        namespaces:
          from: Same
    - name: {{ .Values.gateway.sectionName }}
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.host | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}
