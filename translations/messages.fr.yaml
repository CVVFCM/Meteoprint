seo:
    site_name: Meteoprint

homepage:
    title: Météo imprimable
    subtitle: Recherchez un lieu pour générer son bulletin météo.
    meta_title: Bulletin météo imprimable pour la voile et les régates | Meteoprint
    meta_description: "Bulletin météo imprimable pour la voile : idéal pour le comité de course. Vent, rafales et prévisions aujourd'hui et demain, prêt à afficher."
    submit: Voir la météo
    search:
        label: Lieu
        group:
            spots: Clubs FFVoile
            places: Lieux
    intro:
        lead: Meteoprint génère un bulletin météo clair et imprimable, pour aujourd'hui et demain, sur n'importe quel lieu ou club FFVoile — pensé pour être affiché.
    browse_departments: 'Parcourir les clubs par département'
    uses:
        title: Pour le comité de course
        body: Pendant une régate, le comité de course doit afficher la météo du jour au tableau officiel. Les sites météo grand public sont chargés et s'impriment mal. Meteoprint produit un bulletin propre au format A4 paysage — vent en nœuds, direction, rafales, par créneaux (matin, midi, après-midi, soir) — prêt à être imprimé et épinglé.
    how:
        title: Comment ça marche
        step1: Recherchez un lieu ou un club FFVoile.
        step2: Le bulletin d'aujourd'hui et de demain se génère automatiquement.
        step3: Imprimez (Ctrl/Cmd + P) — la mise en page paysage est déjà prête.
    faq:
        title: Questions fréquentes
        q1: Pourquoi imprimer la météo en régate ?
        a1: "L'affichage de la météo au tableau officiel est obligatoire (Règlement Sportif de la Fédération Française de Voile, II.3.5.4). Une feuille imprimée reste lisible, sans réseau ni écran."
        q2: Quelles données sont affichées ?
        a2: Le code météo, la température, le vent (nœuds) avec sa direction et les rafales, sur cinq créneaux de la journée, pour aujourd'hui et demain.
        q3: Faut-il créer un compte ?
        a3: Non. La recherche et le bulletin imprimable sont accessibles librement.

legal:
    title: Mentions légales
    meta_title: 'Mentions légales | Meteoprint'
    meta_description: 'Mentions légales du site Meteoprint : éditeur, hébergeur, données personnelles et attributions.'
    back: Retour à l'accueil
    editor:
        title: Éditeur
        body: 'Le site Meteoprint est édité à titre personnel et non commercial par Yohan Giarelli, directeur de la publication. Contact via le dépôt du projet : github.com/cvvfcm/meteoprint.'
    host:
        title: Hébergeur
        body: "Le site est hébergé sur Oracle Cloud Infrastructure (région de Paris, eu-paris-1) — Oracle France SAS, 15 boulevard Charles de Gaulle, 92700 Colombes, France, +33 (0)1 57 60 20 20."
    ip:
        title: Propriété intellectuelle
        body: 'Le code source de Meteoprint est publié sous licence GPL-3.0-or-later (github.com/cvvfcm/meteoprint). Les marques, logos et données de tiers restent la propriété de leurs titulaires respectifs.'
    data:
        title: Données personnelles
        body: "Meteoprint ne nécessite aucun compte et ne collecte pas de données personnelles à des fins commerciales ou publicitaires. Les recherches de lieu sont transmises au service de géocodage Nominatim (OpenStreetMap) et les prévisions sont récupérées auprès d'Open-Meteo. Aucun cookie publicitaire ni traceur tiers n'est utilisé ; seul un cookie technique d'autorisation est déposé pour les mises à jour en temps réel (Mercure)."
    attributions:
        title: Attributions
        intro: "Meteoprint s'appuie sur des données et services ouverts :"
        meteo: 'Prévisions météo — Open-Meteo (licence CC BY 4.0), à partir des modèles AROME (haute résolution) et ARPEGE de Météo-France.'
        geo: 'Géocodage et adresses — OpenStreetMap / Nominatim (données sous licence ODbL).'
        clubs: 'Clubs nautiques — Fédération Française de Voile (FFVoile).'

