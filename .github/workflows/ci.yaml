name: CI

on:
    push:
        branches:
            - main
    pull_request: ~
    workflow_dispatch: ~

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        env:
            EXTERNAL_USER_ID: 1001
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - uses: ./.github/workflows/actions/run-docker-services/
            - name: Create test database
              run: docker compose exec -T php composer reset-test
            - name: Run PHPUnit
              run: docker compose exec -T php bin/phpunit
            - name: Doctrine Schema Validator
              run: docker compose exec -T php bin/console -e test doctrine:schema:validate


    playwright:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/workflows/actions/run-docker-services/
            - name: Create database
              run: docker compose exec -T php composer reset
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run Playwright tests
              run: npx playwright test
            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 15

    phpstan:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            actions: write
        env:
            APP_ENV: dev
        name: Static Analysis
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: intl, pdo_pgsql

            - name: Composer install
              run: composer install

            - name: PHPStan
              run: php ./vendor/bin/phpstan analyse --memory-limit=512M

    lint:
        runs-on: ubuntu-latest
        name: Lint
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: intl, pdo_pgsql

            - name: Composer install
              run: composer install

            - name: Twig Lint
              run: php bin/console lint:twig --format=github templates

            - name: Container Lint
              run: php bin/console lint:container

            - name: YAML Lint
              run: find config -name "*.yaml" | xargs php bin/console lint:yaml --format=github

            - name: Translations Lint
              run: php bin/console lint:translations --locale=fr

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0

    cs:
        runs-on: ubuntu-latest
        name: Code Style
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: intl, pdo_pgsql

            - name: Composer install
              run: composer install

            - name: PHP CS Fixer
              run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --ansi

            - name: Twig CS Fixer
              run: ./vendor/bin/twig-cs-fixer lint --report=github

    eslint:
        runs-on: ubuntu-latest
        name: ESLint
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install dependencies
              run: npm ci

            - name: ESLint
              run: npx eslint assets

    stylelint:
        runs-on: ubuntu-latest
        name: StyleLint
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install dependencies
              run: npm ci

            - name: StyleLint
              run: npx stylelint assets/**/*.css
