name: 'Run docker services'
description: ''

runs:
    using: 'composite'
    steps:
        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4
        -   name: Build Docker images
            uses: docker/bake-action@v7
            with:
                pull: true
                load: true
                push: false
                files: |
                    compose.yaml
                    compose.override.yaml
                set: |
                    php.cache-from=type=gha,scope=php-main
                    php.cache-from=type=gha,scope=php-${{ github.ref_name }}
                    php.cache-to=type=gha,scope=php-${{ github.ref_name }},mode=max
        -   name: Set up Docker Compose
            uses: docker/setup-compose-action@v2
            with:
                version: latest
        -   name: Install mkcert & Generate SSL certificates
            run: |
                sudo apt-get install libnss3-tools
                wget -O mkcert https://dl.filippo.io/mkcert/latest?for=linux/amd64
                sudo mv mkcert /usr/local/bin/mkcert
                sudo chmod +x /usr/local/bin/mkcert
                mkcert -install
                mkdir -p .infra/docker/tls
                mkcert -cert-file .infra/docker/tls/cert.pem -key-file .infra/docker/tls/cert.key localhost 127.0.0.1
        -   name: Cache Composer dependencies
            uses: actions/cache@v5
            with:
                path: vendor
                key: composer-${{ hashFiles('composer.lock') }}
                restore-keys: composer-
        -   name: Composer install
            run: docker compose run --rm php composer install
        -   name: Start services
            run: docker compose up --wait php --no-build || (docker compose logs && exit 1)
