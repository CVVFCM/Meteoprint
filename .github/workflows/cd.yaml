name: CD

on:
    release:
        types: [ published ]
    push:
        branches: [ main ]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    build:
        name: Build prod images
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -   name: 'Login to GitHub Container Registry'
                uses: docker/login-action@v4
                with:
                    registry: ghcr.io
                    username: ${{github.actor}}
                    password: ${{secrets.GITHUB_TOKEN}}

            -   name: Docker Meta
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: ghcr.io/yohang/rte-production-monitor/app
                    tags: |
                        type=ref,event=branch
                        type=semver,pattern={{version}}
                        type=semver,pattern={{major}}.{{minor}}
                        type=raw,value=latest,enable=${{ github.event_name == 'release' }}

            -   name: Build and Push
                uses: docker/bake-action@v7
                env:
                    EXTERNAL_USER_ID: 33
                    TAGS: "${{ steps.meta.outputs.version }}${{ github.event_name == 'release' && ',latest' || '' }}"
                with:
                    files: |
                        compose.yaml
                        docker-bake.hcl
                    targets: app
                    push: true
                    set: |
                        app.cache-from=type=gha,scope=app-main
                        app.cache-from=type=gha,scope=app-${{ github.ref_name }}
                        app.cache-to=type=gha,scope=app-${{ github.ref_name }},mode=max
