name: CD

on:
    release:
        types: [ published ]
    push:
        branches: [ main ]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    build:
        name: Build prod images
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            -   name: Checkout
                uses: actions/checkout@v7
            -   name: Set up QEMU
                uses: docker/setup-qemu-action@v4
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            -   name: Docker login
                run: docker login -u cvvfcm -p ${{ secrets.REGISTRY_PASSWORD }}

            -   name: Docker Meta
                id: meta
                uses: docker/metadata-action@v6
                with:
                    images: cvvfcm/meteoprint-app
                    tags: |
                        type=ref,event=branch
                        type=semver,pattern={{version}}
                        type=semver,pattern={{major}}.{{minor}}
                        type=raw,value=latest,enable=${{ github.event_name == 'release' }}

            -   name: Build and Push
                uses: docker/bake-action@v7
                env:
                    EXTERNAL_USER_ID: 33
                    TAGS: "${{ steps.meta.outputs.version }},${{ github.sha }}${{ github.event_name == 'release' && ',latest' || '' }}"
                with:
                    files: |
                        compose.yaml
                        docker-bake.hcl
                    targets: app
                    push: true
                    set: |
                        app.cache-from=type=gha,scope=app-main
                        app.cache-from=type=gha,scope=app-${{ github.ref_name }}
                        app.cache-to=type=gha,scope=app-${{ github.ref_name }},mode=max
    deploy-prod:
        name: Deploy to PROD
        runs-on: ubuntu-latest
        needs: [ build ]
        environment: PROD
        steps:
            -   name: Checkout
                uses: actions/checkout@v7
            -   name: Set up Helm
                uses: azure/setup-helm@v5


            -   name: Install & Configure OCI CLI
                env:
                    OCI_API_KEY: ${{ secrets.OCI_API_KEY }}
                run: |
                    curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
                    chmod +x install.sh
                    ./install.sh --accept-all-defaults
                    echo "/home/runner/bin" >> $GITHUB_PATH

                    mkdir -p ~/.oci
                    cat <<EOF > ~/.oci/config
                    [DEFAULT]
                    user=${{ secrets.OCI_USER_OCID }}
                    fingerprint=${{ secrets.OCI_FINGERPRINT }}
                    tenancy=${{ secrets.OCI_TENANCY_OCID }}
                    region=${{ secrets.OCI_REGION }}
                    key_file=/home/runner/.oci/key.pem
                    EOF

                    echo "$OCI_API_KEY" > ~/.oci/key.pem
                    chmod 600 ~/.oci/config ~/.oci/key.pem

            -   name: Write kubeconfig
                run: |
                    mkdir -p ~/.kube
                    # Changement du nom du secret ici
                    echo "${{ secrets.OKE_KUBECONFIG }}" > ~/.kube/config
                    chmod 600 ~/.kube/config

            -   name: Update chart dependencies
                run: helm dependency update .infra/helm/meteoprint
            -   name: Ensure DB credentials secret
                run: |
                    kubectl create namespace meteoprint --dry-run=client -o yaml | kubectl apply -f -
                    kubectl -n meteoprint create secret generic meteoprint-pg-auth \
                      --from-literal=password="${{ secrets.DATABASE_PASSWORD }}" \
                      --from-literal=postgres-password="${{ secrets.DATABASE_PASSWORD }}" \
                      --dry-run=client -o yaml | kubectl apply -f -
            -   name: Helm deploy
                run: |
                    helm upgrade --install meteoprint .infra/helm/meteoprint \
                      --namespace meteoprint --create-namespace \
                      --set image.tag="${{ github.sha }}" \
                      --set postgresql.enabled=true \
                      --set postgresql.auth.existingSecret=meteoprint-pg-auth \
                      --set secrets.appSecret="${{ secrets.APP_SECRET }}" \
                      --set secrets.mercureJwtSecret="${{ secrets.MERCURE_JWT_SECRET }}" \
                      --wait --rollback-on-failure --timeout 5m
            -   name: Purge Cloudflare cache
                run: |
                    curl -fsS -X POST \
                      "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
                      -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
                      -H "Content-Type: application/json" \
                      --data '{"purge_everything":true}'
